site_name: Codex Batman - Data Science Operating System
site_url: https://wdempsey.github.io/codexbatman/
site_description: Codex-native data science operating system with role-aware workflows for students, practitioners, and managers
site_author: William Dempsey
repo_url: https://github.com/wdempsey/codexbatman
repo_name: wdempsey/codexbatman

edit_uri: ""

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: DM Sans
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.sections
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Start Here:
    - Home: index.md
    - Quickstart: quickstart.md
    - Setup Overview: setup/index.md
    - Install (Mac): toolkit/install-mac.md
    - Install (Windows): toolkit/install-windows.md
    - Set Up VS Code: setup/vscode-setup.md
    - MCP Setup: toolkit/mcp-setup.md
    - How Codex Modes Work: setup/modes.md
    - About: about.md
    - Resources: resources.md
    - Privacy: privacy.md
  - Core Data Science Workflow:
    - Overview: workflows/data-science/index.md
    - Problem Framing: workflows/data-science/problem-framing.md
    - Data Audit: workflows/data-science/data-audit.md
    - Exploratory Analysis: workflows/data-science/eda-plan.md
    - Modeling: workflows/data-science/modeling.md
    - Evaluation: workflows/data-science/evaluation.md
    - Experiment Logging: workflows/data-science/experiment-log.md

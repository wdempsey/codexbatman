site_name: Codex Batman - AI for Data Science Researchers and Managers
site_url: https://claudeblattman.com
site_description: A project manager's guide to building AI workflows — from chatbots to self-improving systems
site_author: Chris Blattman
repo_url: https://github.com/wdempsey/codexbatman
repo_name: wdempsey/codexbatman

edit_uri: ""

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: DM Sans
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.sections
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Start Here:
    - Home: index.md
    - Quickstart: quickstart.md
    - Setup Overview: setup/index.md
    - Install (Mac): toolkit/install-mac.md
    - Install (Windows): toolkit/install-windows.md
    - Set Up VS Code: setup/vscode-setup.md
    - MCP Setup: toolkit/mcp-setup.md
    - How Codex Modes Work: setup/modes.md
    - About: about.md
    - Resources: resources.md
    - Privacy: privacy.md
  - Core Data Science Workflow:
    - Workflow Overview: workflows/index.md
    - Workflow Blueprint: workflows/data-science/blueprint.md
    - Workflow Goals: workflows/data-science/goals.md
    - Project Bootstrap: workflows/data-science/project-bootstrap.md
    - Problem Framing: workflows/data-science/problem-framing.md
    - Data Audit: workflows/data-science/data-audit.md
    - Experiment Log: workflows/data-science/experiment-log.md
    - Workflow Specification: workflows/data-science/workflow.md
    - Product Requirements: workflows/data-science/prd.md
    - Codex Notes: workflows/data-science/codex-notes.md
    - Prompt, Plan, Review, Revise: workflows/first-session-skills.md
    - "Example: Research Design": workflows/examples/research-design-example.md
  - For Students:
    - Foundations: essentials/index.md
    - Chatbots Done Right: essentials/chatbots.md
    - Prompt Engineering: essentials/prompting.md
    - AI Project Folders: essentials/project-folders.md
    - "Example: Work Folder": essentials/folders/work.md
    - "Example: Vacation Planning": essentials/folders/vacation.md
    - "Example: Shopping Decisions": essentials/folders/shopping.md
    - "Example: Health & Fitness": essentials/folders/health.md
    - Wispr Flow: essentials/wispr-flow.md
    - Granola: essentials/granola.md
    - NotebookLM: essentials/notebooklm.md
    - ChatGPT vs Claude: essentials/chatgpt-vs-claude.md
    - The Cost Reality: essentials/cost.md
  - For Data Scientists:
    - Project Instruction File: toolkit/claude-md.md
    - Prompting Guide: downloads/prompting-guide.md
    - Prompt Preferences Template: downloads/prompt-preferences-template.md
    - Real Instruction File Example: downloads/real-claude-md-example.md
    - Tool Limitations: downloads/tool-limitations.md
    - Cloud Storage Guide: downloads/cloud-storage-guide.md
    - Tax Workflow:
      - Overview: tax-workflow/index.md
      - Privacy and Setup: tax-workflow/before-you-start/privacy-and-setup.md
      - "Case Study: Workflow Overview": tax-workflow/case-study/the-workflow-overview.md
      - "Case Study: Document Collection": tax-workflow/case-study/document-collection.md
      - "Case Study: Compilation and Review": tax-workflow/case-study/compilation-and-review.md
      - "Case Study: What AI Got Wrong": tax-workflow/case-study/what-ai-got-wrong.md
      - Academic Tax Basics: tax-workflow/reference/academic-tax-basics.md
      - When to Get Help: tax-workflow/reference/when-to-get-help.md
      - Starter Templates: tax-workflow/build-your-own/starter-templates.md
      - Architecture Patterns: tax-workflow/build-your-own/architecture-patterns.md
  - For Data Science Managers:
    - Executive Assistant: toolkit/executive-assistant.md
    - Project Management: workflows/project-management.md
    - Managing Data Science: workflows/managing-data-science/index.md
    - "Example: Project Dashboard": workflows/examples/project-overview-example.md
  - Skill Library:
    - Skill Library: setup/skill-reference.md
    - How Skills Work: toolkit/skills-guide.md
    - Building Skills: system/building-skills.md
    - Skill Patterns: downloads/skill-patterns.md
  - System Architecture:
    - System Overview: system/index.md
    - Agents vs Skills: system/agents-vs-skills.md
    - Agents vs Skills Guide: downloads/agents-vs-skills-guide.md
    - Model and Tool Behavior: downloads/claude-under-the-hood.md
    - Downloads & Reference Library: downloads/index.md
  - Patterns:
    - Patterns: system/patterns.md
    - Continuous Improvement: system/continuous-improvement.md
    - Collected Tips Log: downloads/collected-tips-log.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - tables
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - meta
  - social:
      cards_layout_options:
        background_color: "#263238"
        color: "#80cbc4"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/wdempsey/codexbatman
    - icon: fontawesome/brands/x-twitter
      link: https://twitter.com/cblatts

copyright: >
  Built by <a href="https://chrisblattman.com">Chris Blattman</a> &mdash;
  shared freely under MIT License
